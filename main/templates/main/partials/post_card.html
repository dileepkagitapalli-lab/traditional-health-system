<div class="card card-nature h-100">
    {% if post.image %}
    <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}"
        style="height: 200px; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px;">
    {% else %}
    <div class="text-center p-5 bg-light"
        style="height: 200px; border-top-left-radius: 12px; border-top-right-radius: 12px;">
        <i class="fa-solid fa-image fa-3x text-muted mt-3"></i>
    </div>
    {% endif %}
    <div class="card-body d-flex flex-column">
        <h5 class="card-title" style="color: var(--nature-dark);">{{ post.title }}</h5>
        <h6 class="card-subtitle mb-2 text-muted">{{ post.get_category_display }} | By {{ post.creator.username }}</h6>
        <p class="card-text flex-grow-1">{{ post.content|truncatechars:100 }}</p>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div>
                <a href="{% url 'like_post' post.id %}" class="btn btn-sm btn-outline-danger">
                    <i class="fa-solid fa-heart"></i> Like ({{ post.likes.count }})
                </a>
                <a href="{% url 'save_post' post.id %}" class="btn btn-sm btn-outline-primary ms-1">
                    <i class="fa-solid fa-bookmark"></i> Save
                </a>
            </div>
            <!-- Add a detail page link if you decide to implement it, for now it just shows content -->
        </div>
    </div>
</div>
